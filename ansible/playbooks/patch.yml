---
- name: Patch canary from verified offline bundle
  hosts: canary
  gather_facts: true
  become: true
  serial: 1
  any_errors_fatal: true
  tasks:
    - name: Run guarded canary patch workflow
      block:
        - name: Run canary preflight checks
          ansible.builtin.include_role:
            name: patch_preflight

        - name: Stage verified offline repository on canary
          ansible.builtin.include_role:
            name: offline_repo

        - name: Apply approved canary updates
          ansible.builtin.include_role:
            name: patch_apply

        - name: Verify canary health and write evidence
          ansible.builtin.include_role:
            name: patch_verify
      always:
        - name: Remove temporary canary patch content
          ansible.builtin.include_role:
            name: patch_cleanup
          when: patch_apply | bool

- name: Patch remaining fleet from verified offline bundle
  hosts: fleet
  gather_facts: true
  become: true
  serial: 1
  max_fail_percentage: 0
  tasks:
    - name: Run guarded fleet patch workflow
      block:
        - name: Run fleet preflight checks
          ansible.builtin.include_role:
            name: patch_preflight

        - name: Stage verified offline repository on fleet host
          ansible.builtin.include_role:
            name: offline_repo

        - name: Apply approved fleet updates
          ansible.builtin.include_role:
            name: patch_apply

        - name: Verify fleet health and write evidence
          ansible.builtin.include_role:
            name: patch_verify
      always:
        - name: Remove temporary fleet patch content
          ansible.builtin.include_role:
            name: patch_cleanup
          when: patch_apply | bool
